<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>к°•мқҳ 07 вҖ” мқҙлІӨнҠё мҳҲм ң (нҖҙмҰҲ м•ұ)</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #1a1a2e;
      color: white;
    }
    h1 { text-align: center; color: #e2b96f; margin-bottom: 30px; }
    .quiz-card {
      background: #16213e;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    /* м§„н–ү л°” */
    .progress-bar-container {
      background: #0f3460;
      border-radius: 8px;
      height: 8px;
      margin-bottom: 20px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e2b96f, #f39c12);
      border-radius: 8px;
      transition: width 0.4s ease;
      width: 0%;
    }
    /* м§Ҳл¬ё м •ліҙ */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #718096;
      margin-bottom: 15px;
    }
    /* м§Ҳл¬ё н…ҚмҠӨнҠё */
    .question-text {
      font-size: 20px;
      font-weight: bold;
      color: white;
      margin-bottom: 25px;
      line-height: 1.5;
      min-height: 60px;
    }
    /* м„ нғқм§Җ лІ„нҠјл“Ө */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .option-btn {
      padding: 14px 12px;
      background: #0f3460;
      color: white;
      border: 2px solid #2d3748;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s, border-color 0.2s;
    }
    .option-btn:hover:not(:disabled) { background: #1a4a8a; border-color: #e2b96f; }
    /* м •лӢө */
    .option-btn.correct { background: #145a32; border-color: #27ae60; color: #2ecc71; }
    /* мҳӨлӢө */
    .option-btn.wrong { background: #641e16; border-color: #e74c3c; color: #e74c3c; }
    /* н”јл“ңл°ұ */
    .feedback {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      display: none;
    }
    .feedback.correct-fb { background: #145a32; color: #2ecc71; }
    .feedback.wrong-fb   { background: #641e16; color: #e74c3c; }
    /* лӢӨмқҢ лІ„нҠј */
    .next-btn {
      width: 100%;
      padding: 14px;
      background: #e2b96f;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }
    .next-btn:hover { background: #c9a055; }
    /* кІ°кіј нҷ”л©ҙ */
    .result-screen { text-align: center; display: none; }
    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 6px solid #e2b96f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .score-num { font-size: 40px; font-weight: bold; color: #e2b96f; }
    .score-label { font-size: 14px; color: #718096; }
    .score-msg { font-size: 18px; margin-bottom: 20px; }
    .restart-btn {
      padding: 14px 40px;
      background: #e2b96f;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .restart-btn:hover { background: #c9a055; }
    /* нӮӨліҙл“ң нһҢнҠё */
    .keyboard-hint {
      text-align: center;
      font-size: 12px;
      color: #4a5568;
      margin-top: 15px;
    }
    kbd {
      background: #2d3748;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<h1>рҹ§  JavaScript нҖҙмҰҲ</h1>

<div class="quiz-card" id="quizCard">
  <!-- м§„н–ү л°” -->
  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- м§Ҳл¬ё м •ліҙ -->
  <div class="quiz-header">
    <span id="questionNum">л¬ём ң 1 / 5</span>
    <span id="scoreDisplay">м җмҲҳ: 0</span>
  </div>

  <!-- м§Ҳл¬ё н…ҚмҠӨнҠё -->
  <div class="question-text" id="questionText"></div>

  <!-- м„ нғқм§Җ лІ„нҠј (мқҙлІӨнҠё мң„мһ„ м Ғмҡ©) -->
  <div class="options" id="optionsContainer"></div>

  <!-- н”јл“ңл°ұ л©”мӢңм§Җ -->
  <div class="feedback" id="feedback"></div>

  <!-- лӢӨмқҢ л¬ём ң лІ„нҠј -->
  <button class="next-btn" id="nextBtn">лӢӨмқҢ л¬ём ң вҶ’</button>

  <!-- нӮӨліҙл“ң нһҢнҠё -->
  <div class="keyboard-hint" id="keyboardHint">
    <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> нӮӨлЎң лӢө м„ нғқ к°ҖлҠҘ
  </div>

  <!-- кІ°кіј нҷ”л©ҙ (мІҳмқҢм—җлҠ” мҲЁк№Җ) -->
  <div class="result-screen" id="resultScreen">
    <div class="score-circle">
      <div class="score-num" id="finalScore"></div>
      <div class="score-label">/ 5м җ</div>
    </div>
    <div class="score-msg" id="scoreMsg"></div>
    <button class="restart-btn" onclick="restartQuiz()">лӢӨмӢң лҸ„м „н•ҳкё°</button>
  </div>
</div>

<script>
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // нҖҙмҰҲ лҚ°мқҙн„°
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const questions = [
    {
      question: "JavaScriptм—җм„ң ліҖмҲҳлҘј м„ м–ён•  л•Ң мһ¬н• лӢ№мқҙ л¶Ҳк°ҖлҠҘн•ң нӮӨмӣҢл“ңлҠ”?",
      options: ["var", "let", "const", "function"],
      answer: 2  // мқёлҚұмҠӨ (0л¶Җн„° мӢңмһ‘)
    },
    {
      question: "лӢӨмқҢ мӨ‘ JavaScriptмқҳ мӣҗмӢң нғҖмһ…(Primitive Type)мқҙ м•„лӢҢ кІғмқҖ?",
      options: ["string", "number", "array", "boolean"],
      answer: 2
    },
    {
      question: "л°°м—ҙм—җм„ң л§Ҳм§Җл§ү мҡ”мҶҢлҘј м ңкұ°н•ҳкі  л°ҳнҷҳн•ҳлҠ” л©”м„ңл“ңлҠ”?",
      options: ["shift()", "pop()", "slice()", "splice()"],
      answer: 1
    },
    {
      question: "nullкіј undefinedмқҳ кҙҖкі„лЎң мҳімқҖ кІғмқҖ?",
      options: ["null === undefined", "null == undefined", "null !== undefinedлҠ” false", "л‘ҳ лӢӨ к°ҷмқҖ нғҖмһ…"],
      answer: 1
    },
    {
      question: "`typeof null`мқҳ кІ°кіјк°’мқҖ?",
      options: ["'null'", "'undefined'", "'object'", "'boolean'"],
      answer: 2
    },
  ];

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // нҖҙмҰҲ мғҒнғң ліҖмҲҳ
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let currentIndex = 0;  // нҳ„мһ¬ л¬ём ң лІҲнҳё (0л¶Җн„° мӢңмһ‘)
  let score = 0;          // нҳ„мһ¬ м җмҲҳ
  let answered = false;   // нҳ„мһ¬ л¬ём ң лӢөліҖ м—¬л¶Җ

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // л¬ём ң л ҢлҚ”л§Ғ
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  /**
   * нҳ„мһ¬ л¬ём ңлҘј нҷ”л©ҙм—җ л ҢлҚ”л§Ғн•ҳлҠ” н•ЁмҲҳ
   */
  function renderQuestion() {
    const q = questions[currentIndex];
    answered = false;

    // м§„н–ү л°” м—…лҚ°мқҙнҠё (currentIndex + 1) / м „мІҙ л¬ём ң мҲҳ Г— 100
    const progress = ((currentIndex) / questions.length) * 100;
    document.getElementById('progressBar').style.width = `${progress}%`;

    // л¬ём ң лІҲнҳё л°Ҹ м җмҲҳ м—…лҚ°мқҙнҠё (textContent мӮ¬мҡ©)
    document.getElementById('questionNum').textContent = `л¬ём ң ${currentIndex + 1} / ${questions.length}`;
    document.getElementById('scoreDisplay').textContent = `м җмҲҳ: ${score}`;

    // м§Ҳл¬ё н…ҚмҠӨнҠё м„Өм • (textContent: м•Ҳм „н•ҳкІҢ н…ҚмҠӨнҠёл§Ң мӮҪмһ…)
    document.getElementById('questionText').textContent = q.question;

    // м„ нғқм§Җ лІ„нҠј мғқм„ұ (innerHTMLлЎң л Ҳмқҙм•„мӣғ кө¬м„ұ)
    const container = document.getElementById('optionsContainer');
    container.innerHTML = q.options.map((opt, i) => `
      <button class="option-btn" data-index="${i}">
        ${i + 1}. ${opt}
      </button>
    `).join('');

    // н”јл“ңл°ұ мҲЁкё°кё°
    const feedback = document.getElementById('feedback');
    feedback.style.display = 'none';
    feedback.className = 'feedback';

    // лӢӨмқҢ лІ„нҠј мҲЁкё°кё°
    document.getElementById('nextBtn').style.display = 'none';

    // нӮӨліҙл“ң нһҢнҠё ліҙмқҙкё°
    document.getElementById('keyboardHint').style.display = 'block';
  }

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // мқҙлІӨнҠё мң„мһ„: м„ нғқм§Җ нҒҙлҰӯ мІҳлҰ¬
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  /**
   * м„ нғқм§Җ м»Ён…Ңмқҙл„Ҳм—җ мқҙлІӨнҠё мң„мһ„мқ„ м„Өм •н•ҳлҠ” н•ЁмҲҳ
   * л¶ҖлӘЁ мҡ”мҶҢ н•ҳлӮҳм—җ мқҙлІӨнҠёлҘј л“ұлЎқн•ҳм—¬ лӘЁл“  лІ„нҠј нҒҙлҰӯ мІҳлҰ¬
   */
  const optionsContainer = document.getElementById('optionsContainer');

  // мқҙлІӨнҠё мң„мһ„: м»Ён…Ңмқҙл„Ҳм—җ н•ң лІҲл§Ң мқҙлІӨнҠё л“ұлЎқ
  optionsContainer.addEventListener('click', function(event) {
    // event.target: мӢӨм ң нҒҙлҰӯлҗң мҡ”мҶҢ нҷ•мқё
    const clickedBtn = event.target.closest('.option-btn');
    if (!clickedBtn || answered) return; // лІ„нҠјмқҙ м•„лӢҲкұ°лӮҳ мқҙлҜё лӢөліҖн–Ҳмңјл©ҙ л¬ҙмӢң

    // dataset.indexлЎң м„ нғқлҗң мҳөм…ҳ лІҲнҳё мқҪкё°
    const selectedIndex = parseInt(clickedBtn.dataset.index);
    checkAnswer(selectedIndex);
  });

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // лӢө нҷ•мқё н•ЁмҲҳ
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  /**
   * м„ нғқн•ң лӢөмқ„ нҷ•мқён•ҳкі  н”јл“ңл°ұмқ„ н‘ңмӢңн•ҳлҠ” н•ЁмҲҳ
   * @param {number} selectedIndex - м„ нғқлҗң мҳөм…ҳмқҳ мқёлҚұмҠӨ
   */
  function checkAnswer(selectedIndex) {
    if (answered) return; // мқҙлҜё лӢөліҖн–Ҳмңјл©ҙ л¬ҙмӢң
    answered = true;

    const q = questions[currentIndex];
    const isCorrect = selectedIndex === q.answer;

    // м җмҲҳ мҰқк°Җ
    if (isCorrect) score++;

    // лӘЁл“  лІ„нҠј л№„нҷңм„ұнҷ” + м •лӢө/мҳӨлӢө н‘ңмӢң
    const buttons = optionsContainer.querySelectorAll('.option-btn');
    buttons.forEach((btn, i) => {
      btn.disabled = true; // л№„нҷңм„ұнҷ”

      if (i === q.answer) {
        btn.classList.add('correct'); // м •лӢө лІ„нҠј мҙҲлЎқмғү
      } else if (i === selectedIndex && !isCorrect) {
        btn.classList.add('wrong'); // нӢҖлҰ° лІ„нҠј л№Ёк°„мғү
      }
    });

    // н”јл“ңл°ұ л©”мӢңм§Җ н‘ңмӢң
    const feedback = document.getElementById('feedback');
    feedback.style.display = 'block';

    if (isCorrect) {
      feedback.textContent = 'вң… м •лӢөмһ…лӢҲлӢӨ!';
      feedback.className = 'feedback correct-fb';
    } else {
      feedback.textContent = `вқҢ мҳӨлӢө! м •лӢө: ${q.options[q.answer]}`;
      feedback.className = 'feedback wrong-fb';
    }

    // м җмҲҳ м—…лҚ°мқҙнҠё
    document.getElementById('scoreDisplay').textContent = `м җмҲҳ: ${score}`;

    // лӢӨмқҢ лІ„нҠј н‘ңмӢң
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.style.display = 'block';

    // л§Ҳм§Җл§ү л¬ём ңмқҙл©ҙ лІ„нҠј н…ҚмҠӨнҠё ліҖкІҪ
    if (currentIndex === questions.length - 1) {
      nextBtn.textContent = 'кІ°кіј ліҙкё° рҹҸҶ';
    } else {
      nextBtn.textContent = 'лӢӨмқҢ л¬ём ң вҶ’';
    }

    // нӮӨліҙл“ң нһҢнҠё мҲЁкё°кё°
    document.getElementById('keyboardHint').style.display = 'none';
  }

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // лӢӨмқҢ л¬ём ң мқҙлІӨнҠё
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  /**
   * лӢӨмқҢ лІ„нҠј нҒҙлҰӯ н•ёл“Өлҹ¬
   */
  document.getElementById('nextBtn').addEventListener('click', function() {
    currentIndex++;

    if (currentIndex < questions.length) {
      renderQuestion(); // лӢӨмқҢ л¬ём ң л ҢлҚ”л§Ғ
    } else {
      showResult(); // кІ°кіј нҷ”л©ҙ н‘ңмӢң
    }
  });

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // нӮӨліҙл“ң мқҙлІӨнҠё: мҲ«мһҗ нӮӨлЎң лӢө м„ нғқ
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  /**
   * нӮӨліҙл“ң мқҙлІӨнҠё н•ёл“Өлҹ¬
   * 1~4 нӮӨлЎң м„ нғқм§Җ м„ нғқ, EnterлЎң лӢӨмқҢ л¬ём ң мқҙлҸҷ
   */
  document.addEventListener('keydown', function(event) {
    // event.keyлЎң лҲҢлҰ° нӮӨ нҷ•мқё
    const key = event.key;

    // 1~4 нӮӨ: н•ҙлӢ№ м„ нғқм§Җ м„ нғқ
    if (['1', '2', '3', '4'].includes(key) && !answered) {
      const index = parseInt(key) - 1; // '1' вҶ’ 0, '2' вҶ’ 1 ...
      if (index < questions[currentIndex].options.length) {
        checkAnswer(index);
      }
    }

    // Enter нӮӨ: лӢӨмқҢ л¬ём ңлЎң (лӢөліҖ нӣ„м—җл§Ң)
    if (key === 'Enter' && answered) {
      document.getElementById('nextBtn').click();
    }
  });

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // кІ°кіј нҷ”л©ҙ
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  /**
   * нҖҙмҰҲ мҷ„лЈҢ нӣ„ кІ°кіј нҷ”л©ҙмқ„ н‘ңмӢңн•ҳлҠ” н•ЁмҲҳ
   */
  function showResult() {
    // нҖҙмҰҲ мҪҳн…җмё  мҲЁкё°кё°
    document.getElementById('questionNum').style.display = 'none';
    document.getElementById('scoreDisplay').style.display = 'none';
    document.getElementById('questionText').style.display = 'none';
    document.getElementById('optionsContainer').style.display = 'none';
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('keyboardHint').style.display = 'none';

    // м§„н–үл°” 100%
    document.getElementById('progressBar').style.width = '100%';

    // кІ°кіј нҷ”л©ҙ н‘ңмӢң
    const resultScreen = document.getElementById('resultScreen');
    resultScreen.style.display = 'block';

    // м җмҲҳ н‘ңмӢң
    document.getElementById('finalScore').textContent = score;

    // м җмҲҳм—җ л”°лҘё л©”мӢңм§Җ
    let msg;
    if (score === 5)      msg = 'рҹҸҶ мҷ„лІҪ! лӘЁл‘җ л§һнҳ”мҠөлӢҲлӢӨ!';
    else if (score >= 4)  msg = 'рҹҘҮ нӣҢлҘӯн•©лӢҲлӢӨ! кұ°мқҳ лӢӨ л§һнҳ”м–ҙмҡ”!';
    else if (score >= 3)  msg = 'рҹҘҲ мўӢм•„мҡ”! мЎ°кёҲл§Ң лҚ” кіөл¶Җн•ҙлҙҗмҡ”!';
    else if (score >= 2)  msg = 'рҹҘү м•„мүҪл„Өмҡ”. лӢӨмӢң лҸ„м „н•ҙліҙм„ёмҡ”!';
    else                  msg = 'рҹ’Ә мІҳмқҢл¶Җн„° лӢӨмӢң кіөл¶Җн•ҙлҙҗмҡ”!';

    document.getElementById('scoreMsg').textContent = msg;
  }

  /**
   * нҖҙмҰҲлҘј мІҳмқҢл¶Җн„° лӢӨмӢң мӢңмһ‘н•ҳлҠ” н•ЁмҲҳ
   */
  function restartQuiz() {
    currentIndex = 0;
    score = 0;
    answered = false;

    // мҲЁкІјлҚҳ мҡ”мҶҢл“Ө лӢӨмӢң н‘ңмӢң
    ['questionNum', 'scoreDisplay', 'questionText', 'optionsContainer'].forEach(id => {
      document.getElementById(id).style.display = '';
    });

    document.getElementById('resultScreen').style.display = 'none';

    renderQuestion(); // мІ« л¬ём ң л ҢлҚ”л§Ғ
  }

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // мҙҲкё° мӢӨн–ү
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  renderQuestion();
</script>
