<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My Express Site - 연락처</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
    nav a { margin-right: 15px; text-decoration: none; color: #0066cc; }
    input, textarea { display: block; width: 100%; margin: 5px 0 15px; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #0066cc; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <nav>
    <a href="/">홈</a>
    <a href="/about">소개</a>
    <a href="/contact">연락처</a>
  </nav>
  <hr>
  <h1>연락처</h1>
  <form method="POST" action="/contact">
    <label>이름: <input type="text" name="name" required></label>
    <label>이메일: <input type="email" name="email" required></label>
    <label>메시지: <textarea name="message" rows="5" required></textarea></label>
    <button type="submit">보내기</button>
  </form>
</body>
</html>
