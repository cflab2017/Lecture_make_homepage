<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강의 04 — 배열 예제 (할 일 목록 앱)</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f0f4f8;
    }
    h1 { text-align: center; color: #2c3e50; }
    .app {
      background: white;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    /* 입력 영역 */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .add-form input {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
    }
    .add-form input:focus { border-color: #3498db; outline: none; }
    .add-form button {
      padding: 12px 20px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }
    .add-form button:hover { background: #2980b9; }
    /* 통계 영역 */
    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .stat-box {
      flex: 1;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-number { font-size: 24px; font-weight: bold; color: #2c3e50; }
    .stat-label { font-size: 12px; color: #7f8c8d; }
    /* 할 일 목록 */
    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      margin: 6px 0;
      background: #f8f9fa;
      transition: background 0.2s;
    }
    .todo-item:hover { background: #eaf4fb; }
    /* 완료 상태 */
    .todo-item.done { background: #eafaf1; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #aaa; }
    /* 체크박스 */
    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #27ae60;
    }
    /* 할 일 텍스트 */
    .todo-text { flex: 1; font-size: 15px; color: #2c3e50; }
    /* 삭제 버튼 */
    .delete-btn {
      padding: 5px 10px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
    }
    .delete-btn:hover { background: #c0392b; }
    /* 빈 상태 메시지 */
    .empty-msg {
      text-align: center;
      color: #bbb;
      padding: 30px 0;
      font-size: 15px;
    }
    /* 하단 액션 버튼 */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 15px;
    }
    .action-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-clear-done { background: #ecf0f1; color: #7f8c8d; }
    .btn-clear-done:hover { background: #dfe6e9; }
    .btn-clear-all { background: #fdecea; color: #e74c3c; }
    .btn-clear-all:hover { background: #fadbd8; }
  </style>
</head>
<body>

<h1>✅ 할 일 목록 앱</h1>

<div class="app">
  <!-- 입력 폼 -->
  <div class="add-form">
    <input type="text" id="todoInput" placeholder="할 일을 입력하세요..." maxlength="50">
    <button onclick="addTodo()">추가</button>
  </div>

  <!-- 통계 -->
  <div class="stats">
    <div class="stat-box">
      <div class="stat-number" id="totalCount">0</div>
      <div class="stat-label">전체</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="doneCount" style="color:#27ae60">0</div>
      <div class="stat-label">완료</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="remainCount" style="color:#e74c3c">0</div>
      <div class="stat-label">남은 일</div>
    </div>
  </div>

  <!-- 할 일 목록 -->
  <ul class="todo-list" id="todoList"></ul>

  <!-- 하단 버튼 -->
  <div class="actions">
    <button class="action-btn btn-clear-done" onclick="clearDone()">완료 항목 삭제</button>
    <button class="action-btn btn-clear-all" onclick="clearAll()">전체 삭제</button>
  </div>
</div>

<script>
  // ─────────────────────────────────────────
  // 데이터: 할 일 배열
  // 각 항목은 { id, text, done } 형태의 객체
  // ─────────────────────────────────────────
  let todos = [
    { id: 1, text: "JavaScript 강의 수강하기", done: true },
    { id: 2, text: "배열 메서드 연습하기", done: false },
    { id: 3, text: "할 일 목록 앱 완성하기", done: false },
  ];

  // 새 항목의 고유 ID 생성용 카운터
  let nextId = todos.length + 1;

  // ─────────────────────────────────────────
  // 렌더링 함수: 배열 → 화면 출력
  // map으로 각 항목을 HTML로 변환
  // ─────────────────────────────────────────

  /**
   * todos 배열을 읽어 화면에 목록을 다시 그리는 함수
   */
  function render() {
    const list = document.getElementById('todoList');

    // 배열이 비어있을 때 안내 메시지 출력
    if (todos.length === 0) {
      list.innerHTML = '<div class="empty-msg">📝 할 일을 추가해보세요!</div>';
      updateStats();
      return;
    }

    // map으로 각 todo 객체를 <li> HTML 문자열로 변환
    const itemsHTML = todos.map(todo => `
      <li class="todo-item ${todo.done ? 'done' : ''}" id="item-${todo.id}">
        <input
          type="checkbox"
          ${todo.done ? 'checked' : ''}
          onchange="toggleDone(${todo.id})"
        >
        <span class="todo-text">${todo.text}</span>
        <button class="delete-btn" onclick="deleteTodo(${todo.id})">삭제</button>
      </li>
    `).join(''); // 배열을 하나의 문자열로 합치기

    list.innerHTML = itemsHTML;

    // 통계 업데이트
    updateStats();
  }

  /**
   * 전체/완료/남은 항목 수를 계산하여 화면에 표시하는 함수
   */
  function updateStats() {
    // filter로 완료된 항목만 추출하여 개수 계산
    const doneCount = todos.filter(t => t.done).length;
    const totalCount = todos.length;
    const remainCount = totalCount - doneCount;

    document.getElementById('totalCount').textContent = totalCount;
    document.getElementById('doneCount').textContent = doneCount;
    document.getElementById('remainCount').textContent = remainCount;
  }

  // ─────────────────────────────────────────
  // CRUD 함수들
  // ─────────────────────────────────────────

  /**
   * 새 할 일을 배열에 추가하는 함수 (push 사용)
   */
  function addTodo() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim(); // 앞뒤 공백 제거

    // 빈 입력 무시
    if (text === '') return;

    // 새 todo 객체 생성 후 배열에 추가 (push)
    todos.push({
      id: nextId++, // 고유 ID 할당 후 증가
      text: text,
      done: false,
    });

    // 입력창 초기화
    input.value = '';
    input.focus();

    // 화면 다시 그리기
    render();
  }

  /**
   * 완료 상태를 토글하는 함수 (find + 속성 변경)
   * @param {number} id - 토글할 항목의 ID
   */
  function toggleDone(id) {
    // find로 해당 ID의 todo 객체를 찾아 done 속성을 반전
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.done = !todo.done; // true ↔ false 토글
    }
    render(); // 화면 업데이트
  }

  /**
   * 특정 항목을 삭제하는 함수 (filter 사용)
   * @param {number} id - 삭제할 항목의 ID
   */
  function deleteTodo(id) {
    // filter: 해당 ID가 아닌 항목만 남긴 새 배열 생성
    todos = todos.filter(t => t.id !== id);
    render();
  }

  /**
   * 완료된 항목을 모두 삭제하는 함수 (filter 사용)
   */
  function clearDone() {
    // done이 false인 항목만 남기기
    todos = todos.filter(t => !t.done);
    render();
  }

  /**
   * 모든 항목을 삭제하는 함수
   */
  function clearAll() {
    if (todos.length === 0) return;
    if (!confirm('모든 할 일을 삭제할까요?')) return;
    todos = []; // 빈 배열로 초기화
    render();
  }

  // Enter 키로 할 일 추가
  document.getElementById('todoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  // 초기 렌더링
  render();
</script>

</body>
</html>
