<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 08 정답 — 날씨 앱</title>
  <style>
    /* 전체 페이지: 그라데이션 배경 */
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      box-sizing: border-box;
    }

    /* 날씨 카드 */
    .weather-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    /* 도시 이름 */
    .city-name {
      font-size: 14px;
      color: #7f8c8d;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    /* 카드 제목 */
    .card-title {
      font-size: 22px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 30px;
    }

    /* ── 로딩 상태 ────────────────── */
    .loading-area {
      padding: 30px 0;
      display: none; /* 처음에는 숨김 */
    }

    /* CSS 로딩 스피너 */
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #e8d5f5;
      border-top-color: #764ba2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: #7f8c8d;
      font-size: 15px;
    }

    /* ── 날씨 정보 표시 영역 ────────── */
    .weather-display {
      display: none; /* 처음에는 숨김 */
    }

    /* 날씨 이모지 (크게) */
    .weather-emoji {
      font-size: 80px;
      line-height: 1;
      margin-bottom: 10px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    /* 날씨 설명 */
    .weather-desc {
      font-size: 20px;
      color: #34495e;
      margin-bottom: 20px;
    }

    /* 온도 표시 (크게) */
    .temperature {
      font-size: 64px;
      font-weight: 300;
      color: #2c3e50;
      margin-bottom: 5px;
      line-height: 1;
    }
    .temp-unit {
      font-size: 28px;
      color: #7f8c8d;
      vertical-align: super;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #ecf0f1;
      margin: 25px 0;
    }

    /* 업데이트 시간 */
    .update-time {
      font-size: 13px;
      color: #bdc3c7;
      margin-bottom: 20px;
    }

    /* 추가 정보 (API 출처) */
    .api-info {
      font-size: 11px;
      color: #d5dbdb;
      margin-bottom: 20px;
    }

    /* ── 에러 상태 ────────────────── */
    .error-area {
      display: none; /* 처음에는 숨김 */
      padding: 20px 0;
    }
    .error-emoji { font-size: 50px; margin-bottom: 10px; }
    .error-msg {
      color: #e74c3c;
      font-size: 15px;
      margin-bottom: 8px;
    }
    .error-detail {
      color: #95a5a6;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* ── 버튼 공통 스타일 ────────── */
    .refresh-btn {
      padding: 14px 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    }
    .refresh-btn:hover { opacity: 0.9; }
    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn:disabled {
      background: #d5dbdb;
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>
<body>

<div class="weather-card">
  <!-- 카드 헤더 -->
  <div class="city-name">Seoul, Korea</div>
  <div class="card-title">현재 날씨</div>

  <!-- 로딩 상태 영역 -->
  <div class="loading-area" id="loadingArea">
    <div class="spinner"></div>
    <div class="loading-text">날씨 정보를 가져오는 중...</div>
  </div>

  <!-- 날씨 표시 영역 (처음에는 숨김) -->
  <div class="weather-display" id="weatherDisplay">
    <!-- 날씨 이모지와 설명 -->
    <div class="weather-emoji" id="weatherEmoji"></div>
    <div class="weather-desc" id="weatherDesc"></div>

    <!-- 온도 -->
    <div class="temperature">
      <span id="tempValue">--</span>
      <span class="temp-unit">°C</span>
    </div>

    <hr class="divider">

    <!-- 마지막 업데이트 시간 -->
    <div class="update-time" id="updateTime"></div>
    <div class="api-info">데이터 출처: Open-Meteo API (api.open-meteo.com)</div>
  </div>

  <!-- 에러 영역 (처음에는 숨김) -->
  <div class="error-area" id="errorArea">
    <div class="error-emoji">⚠️</div>
    <div class="error-msg">날씨 정보를 가져오지 못했습니다.</div>
    <div class="error-detail" id="errorDetail"></div>
  </div>

  <!-- 새로고침 버튼 -->
  <button class="refresh-btn" id="refreshBtn" onclick="getWeather()">
    새로고침
  </button>
</div>

<script>
  // ─────────────────────────────────────────
  // Open-Meteo API URL (서울 좌표)
  // latitude=37.5665: 위도 (서울)
  // longitude=126.9780: 경도 (서울)
  // current=temperature_2m,weather_code: 현재 기온과 날씨 코드
  // ─────────────────────────────────────────
  const API_URL = 'https://api.open-meteo.com/v1/forecast' +
    '?latitude=37.5665&longitude=126.9780' +
    '&current=temperature_2m,weather_code';

  // ─────────────────────────────────────────
  // weather_code → 날씨 정보 변환 함수
  // WMO Weather Code 표준에 따른 매핑
  // ─────────────────────────────────────────

  /**
   * WMO 날씨 코드를 이모지와 설명으로 변환하는 함수
   * @param {number} code - WMO 날씨 코드
   * @returns {{ emoji: string, desc: string }} 이모지와 설명 객체
   */
  function getWeatherInfo(code) {
    if (code === 0)          return { emoji: '☀️',  desc: '맑음' };
    if (code <= 3)           return { emoji: '⛅',  desc: '대체로 흐림' };
    if (code <= 48)          return { emoji: '🌫️', desc: '안개' };
    if (code <= 55)          return { emoji: '🌦️', desc: '이슬비' };
    if (code <= 65)          return { emoji: '🌧️', desc: '비' };
    if (code <= 75)          return { emoji: '🌨️', desc: '눈' };
    if (code <= 82)          return { emoji: '🌩️', desc: '소나기' };
    if (code <= 99)          return { emoji: '⛈️', desc: '뇌우' };
    return                          { emoji: '🌡️', desc: '알 수 없음' };
  }

  // ─────────────────────────────────────────
  // 날씨 데이터 가져오기 (메인 함수)
  // ─────────────────────────────────────────

  /**
   * Open-Meteo API에서 서울 날씨 데이터를 비동기로 가져오는 함수
   * async/await + try/catch/finally 패턴 사용
   */
  async function getWeather() {
    // DOM 요소 참조
    const loadingArea  = document.getElementById('loadingArea');
    const weatherDisplay = document.getElementById('weatherDisplay');
    const errorArea    = document.getElementById('errorArea');
    const refreshBtn   = document.getElementById('refreshBtn');

    // ── 로딩 상태 시작 ────────────────────

    // 이전 상태 초기화: 모든 영역 숨기기
    loadingArea.style.display = 'block';    // 로딩 스피너 표시
    weatherDisplay.style.display = 'none';  // 날씨 정보 숨기기
    errorArea.style.display = 'none';       // 에러 메시지 숨기기

    // 버튼 비활성화 (중복 요청 방지)
    refreshBtn.disabled = true;
    refreshBtn.textContent = '불러오는 중...';

    // ── API 요청 ───────────────────────────

    try {
      // fetch: HTTP GET 요청 전송
      // await: 응답이 올 때까지 이 줄에서 대기 (다른 코드는 계속 실행)
      const response = await fetch(API_URL);

      // HTTP 응답 상태 확인 (200: 성공, 4xx/5xx: 오류)
      if (!response.ok) {
        // 서버 에러 시 명시적으로 Error 객체 생성 및 throw
        throw new Error(`API 서버 오류: ${response.status} ${response.statusText}`);
      }

      // 응답 본문을 JSON으로 파싱 (이것도 비동기 → await 필요)
      const data = await response.json();

      // API 응답 구조: data.current.temperature_2m, data.current.weather_code
      const { temperature_2m, weather_code } = data.current;

      // weather_code로 날씨 정보 변환
      const weatherInfo = getWeatherInfo(weather_code);

      // ── 데이터를 화면에 표시 ────────────

      // 날씨 이모지와 설명 업데이트
      document.getElementById('weatherEmoji').textContent = weatherInfo.emoji;
      document.getElementById('weatherDesc').textContent  = weatherInfo.desc;

      // 온도 표시 (소수점 1자리, toFixed 사용)
      document.getElementById('tempValue').textContent = temperature_2m.toFixed(1);

      // 마지막 업데이트 시간 표시 (현재 시각)
      const now = new Date();
      document.getElementById('updateTime').textContent =
        `마지막 업데이트: ${now.toLocaleTimeString('ko-KR')}`;

      // 날씨 정보 영역 표시
      weatherDisplay.style.display = 'block';

    } catch (error) {
      // ── 에러 처리 ──────────────────────

      // 네트워크 오류, API 오류 등을 모두 여기서 처리
      errorArea.style.display = 'block';

      // 에러 상세 메시지 표시 (textContent: XSS 방지)
      const errorDetail = document.getElementById('errorDetail');
      errorDetail.textContent = error.message || '알 수 없는 오류가 발생했습니다.';

      // 오류 유형에 따른 안내
      if (error.message.includes('fetch')) {
        errorDetail.textContent = '인터넷 연결을 확인해주세요.';
      }

    } finally {
      // ── finally: 성공/실패 무관하게 항상 실행 ──
      // 로딩 스피너 숨기기
      loadingArea.style.display = 'none';

      // 버튼 복구 (다시 클릭 가능하게)
      refreshBtn.disabled = false;
      refreshBtn.textContent = '새로고침';
    }
  }

  // ─────────────────────────────────────────
  // 페이지 로드 시 자동으로 날씨 가져오기
  // DOMContentLoaded: DOM이 준비되면 실행
  // ─────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    getWeather(); // 페이지 로드 시 자동 호출
  });
</script>

</body>
</html>
