<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>접근성 모달 다이얼로그 — 과제 정답</title>
    <style>
        /* ── 기본 스타일 ── */
        body { font-family: 'Noto Sans KR', sans-serif; padding: 40px; background: #f5f5f5; }
        h1 { margin-bottom: 24px; }

        /* ── 포커스 스타일: outline 절대 제거 금지! ── */
        :focus-visible {
            outline: 3px solid #0066cc;
            outline-offset: 2px;
            border-radius: 2px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }
        #open-modal {
            background: #0066cc;
            color: white;
        }
        #open-modal:hover { background: #0052a3; }

        /* ── 모달 오버레이
           모달이 닫혀 있을 때: display:none으로 완전히 숨김
           스크린리더도 접근 못하게 해야 함 (hidden 속성 사용) ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        /* hidden 속성으로 숨김 (display:none 적용됨) */
        .modal-overlay[hidden] { display: none; }

        /* ── 모달 박스 ── */
        .modal {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }

        .modal h2 { margin-bottom: 12px; color: #1a1a2e; }
        .modal p  { color: #555; margin-bottom: 24px; }

        /* ── 모달 닫기 버튼 (X 버튼) ── */
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            padding: 0;
            font-weight: normal;
        }
        .modal-close:hover { background: #f0f0f0; }

        /* ── 모달 내 버튼 그룹 ── */
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .btn-confirm { background: #0066cc; color: white; }
        .btn-confirm:hover { background: #0052a3; }
        .btn-cancel  { background: #eee; color: #333; }
        .btn-cancel:hover { background: #ddd; }

        /* ── 성공 메시지 ── */
        #success-msg {
            margin-top: 16px;
            padding: 12px;
            background: #e6f4ea;
            border: 1px solid #4caf50;
            border-radius: 6px;
            color: #1b5e20;
            display: none;
        }
    </style>
</head>
<body>

    <!-- ── 메인 콘텐츠 영역
         모달이 열리면 이 영역을 aria-hidden="true"로 설정하여
         스크린리더가 배경 콘텐츠를 읽지 않도록 함 ── -->
    <div id="main-content">
        <h1>접근성 모달 다이얼로그 예제</h1>
        <p>아래 버튼을 클릭하거나 Enter/Space로 모달을 열 수 있습니다.</p>
        <p>모달이 열리면 Tab, Shift+Tab으로 포커스가 모달 안에서만 순환합니다.</p>

        <!-- 모달을 여는 트리거 버튼
             id를 기억해두고, 모달 닫힌 후 포커스를 이곳으로 복귀 -->
        <button id="open-modal">주문 확인하기</button>

        <!-- 주문 완료 후 표시될 성공 메시지
             role="status": 스크린리더가 자동으로 읽음 -->
        <div id="success-msg" role="status">
            주문이 완료되었습니다! 감사합니다.
        </div>
    </div>

    <!-- ── 모달 오버레이
         hidden 속성: 닫혀있을 때 완전히 숨김 (display:none)
         모달이 열릴 때 hidden 속성을 제거하여 표시 ── -->
    <div
        class="modal-overlay"
        id="modal-overlay"
        hidden
        onclick="handleOverlayClick(event)"
    >
        <!-- ── 모달 다이얼로그
             role="dialog": 다이얼로그 역할을 스크린리더에 알림
             aria-modal="true": 이 영역 외부를 스크린리더가 무시하도록 함
             aria-labelledby: 제목 요소(h2)와 연결하여 스크린리더가 "주문 확인 다이얼로그"라고 읽음
             aria-describedby: 부가 설명 연결 ── -->
        <div
            class="modal"
            id="main-modal"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modal-title"
            aria-describedby="modal-desc"
        >
            <!-- 닫기 버튼: aria-label로 역할 명시 (X 아이콘만 있어서 텍스트 없음) -->
            <button
                class="modal-close"
                id="modal-close-btn"
                aria-label="모달 닫기"
                onclick="closeModal()"
            >
                &#x2715; <!-- × 문자 -->
            </button>

            <!-- 모달 제목: aria-labelledby에서 참조되는 id -->
            <h2 id="modal-title">주문을 완료하시겠습니까?</h2>

            <!-- 모달 설명: aria-describedby에서 참조 -->
            <p id="modal-desc">
                선택하신 상품 내역을 확인하세요.<br>
                <strong>노트북</strong> 1개 / 총 금액: <strong>1,500,000원</strong>
            </p>

            <!-- 모달 내 버튼들
                 이 버튼들이 Focus Trap의 대상 ── -->
            <div class="modal-buttons">
                <button class="btn-cancel" id="cancel-btn" onclick="closeModal()">취소</button>
                <button class="btn-confirm" id="confirm-btn" onclick="confirmOrder()">주문 확인</button>
            </div>
        </div>
    </div>

    <script>
        // ── 모달을 연 트리거 버튼 참조 보관 (닫힌 후 포커스 복귀용)
        let triggerElement = null;

        // ── 포커스 가능한 요소 선택자 목록
        const FOCUSABLE_SELECTORS = [
            'a[href]',
            'button:not([disabled])',
            'input:not([disabled])',
            'select:not([disabled])',
            'textarea:not([disabled])',
            '[tabindex]:not([tabindex="-1"])',
        ].join(', ');

        // ── 모달 열기 함수
        function openModal(triggerBtn) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('main-modal');
            const mainContent = document.getElementById('main-content');

            // 트리거 버튼 저장 (닫힌 후 포커스 복귀에 사용)
            triggerElement = triggerBtn;

            // 모달 표시 (hidden 속성 제거 → display:flex 적용)
            overlay.removeAttribute('hidden');

            // 배경 콘텐츠를 스크린리더에서 숨김
            // aria-hidden="true": 해당 요소와 자식 요소를 모두 숨김
            mainContent.setAttribute('aria-hidden', 'true');

            // 모달 내 첫 번째 포커스 가능 요소로 이동
            // 닫기(X) 버튼이 첫 번째 요소이므로 그곳으로 포커스
            const firstFocusable = modal.querySelectorAll(FOCUSABLE_SELECTORS)[0];
            if (firstFocusable) {
                // setTimeout: DOM 업데이트 후 포커스 (즉시 하면 hidden이 아직 적용 중일 수 있음)
                setTimeout(() => firstFocusable.focus(), 50);
            }

            // Focus Trap 이벤트 등록
            modal.addEventListener('keydown', trapFocus);

            // Escape 키 닫기 이벤트 등록
            document.addEventListener('keydown', handleEscape);
        }

        // ── 모달 닫기 함수
        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('main-modal');
            const mainContent = document.getElementById('main-content');

            // 모달 숨기기 (hidden 속성 추가)
            overlay.setAttribute('hidden', '');

            // 배경 콘텐츠의 aria-hidden 해제 (다시 접근 가능하게)
            mainContent.removeAttribute('aria-hidden');

            // Focus Trap & Escape 이벤트 제거
            modal.removeEventListener('keydown', trapFocus);
            document.removeEventListener('keydown', handleEscape);

            // 모달을 열었던 버튼으로 포커스 복귀
            // 사용자가 어디에 있었는지 기억하고 돌아감
            if (triggerElement) {
                triggerElement.focus();
                triggerElement = null;
            }
        }

        // ── Focus Trap 함수
        // Tab/Shift+Tab이 모달 내에서만 순환하도록 제한
        function trapFocus(e) {
            if (e.key !== 'Tab') return;

            const modal = document.getElementById('main-modal');
            const focusableElements = Array.from(modal.querySelectorAll(FOCUSABLE_SELECTORS));
            const firstFocusable = focusableElements[0];
            const lastFocusable = focusableElements[focusableElements.length - 1];

            if (e.shiftKey) {
                // Shift+Tab: 첫 번째 요소에서 마지막으로 순환
                if (document.activeElement === firstFocusable) {
                    e.preventDefault(); // 기본 동작(모달 밖으로 이동) 차단
                    lastFocusable.focus();
                }
            } else {
                // Tab: 마지막 요소에서 첫 번째로 순환
                if (document.activeElement === lastFocusable) {
                    e.preventDefault();
                    firstFocusable.focus();
                }
            }
        }

        // ── Escape 키 처리
        function handleEscape(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        }

        // ── 오버레이 클릭 시 모달 닫기 (배경 클릭)
        function handleOverlayClick(e) {
            // 모달 박스 자체를 클릭한 게 아닐 때만 닫기
            if (e.target === document.getElementById('modal-overlay')) {
                closeModal();
            }
        }

        // ── 주문 확인 처리
        function confirmOrder() {
            closeModal();

            // 성공 메시지 표시
            // role="status": 스크린리더가 자동으로 읽음 (alert보다 덜 방해)
            const msg = document.getElementById('success-msg');
            msg.style.display = 'block';

            // 3초 후 숨기기
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        // ── 버튼 클릭 이벤트 등록
        document.getElementById('open-modal').addEventListener('click', function () {
            openModal(this); // this: 클릭된 버튼 (트리거)
        });
    </script>
</body>
</html>
