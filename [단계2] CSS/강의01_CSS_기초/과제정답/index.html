<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 배지 만들기 — 과제 정답</title>
  <!-- 외부 CSS 파일 연결 (인라인 CSS 사용하지 않음) -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>나만의 배지 만들기</h1>
  <p class="subtitle">클래스 선택자와 ID 선택자를 활용한 배지 3종</p>

  <!-- 배지 컨테이너 -->
  <div class="badge-container">

    <!-- .badge (공통) + .badge-success (초록 배지) -->
    <span class="badge badge-success">성공</span>

    <!-- .badge (공통) + .badge-warning (경고 배지) -->
    <span class="badge badge-warning">경고</span>

    <!-- .badge (공통) + #badge-special (ID 선택자로 특별 배지) -->
    <span id="badge-special" class="badge">특별</span>

  </div>

  <!-- 각 배지 설명 -->
  <div class="info-container">

    <div class="info-card">
      <h3>.badge-success</h3>
      <p>클래스 선택자로 만든 초록 배지입니다.<br>
         공통 스타일(.badge)과 초록 색상(.badge-success)을 조합했습니다.</p>
    </div>

    <div class="info-card">
      <h3>.badge-warning</h3>
      <p>클래스 선택자로 만든 경고 배지입니다.<br>
         형제 선택자(+)로 첫 번째 배지 다음에 왼쪽 여백이 추가됩니다.</p>
    </div>

    <div class="info-card">
      <h3>#badge-special</h3>
      <p>ID 선택자로 만든 특별 배지입니다.<br>
         ID 선택자는 페이지 내 유일한 요소에 사용합니다.</p>
    </div>

  </div>

</body>
</html>
