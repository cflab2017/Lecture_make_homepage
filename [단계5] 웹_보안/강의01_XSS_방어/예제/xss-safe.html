<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>XSS 방어된 댓글 페이지</title>
    <!-- CSP 헤더를 meta 태그로 설정 (서버 헤더가 더 권장되지만 예제용) -->
    <!-- script-src 'self': 같은 도메인 스크립트만 허용 -->
    <!-- 실제로는 서버에서 Content-Security-Policy 헤더로 설정 -->
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .comment { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 6px; background: white; }
        textarea { width: 100%; height: 80px; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        button { padding: 8px 16px; background: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1b5e20; }

        /* 안전 배너 */
        .safe-banner {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .comment-author { font-weight: bold; color: #333; margin-bottom: 4px; }
        .comment-text { color: #555; white-space: pre-wrap; word-break: break-word; }
        .comment-time { font-size: 0.8rem; color: #999; margin-top: 4px; }

        .defense-info {
            background: #f0f4ff;
            border: 1px solid #3f51b5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="safe-banner">
        ✓ <strong>안전한 버전</strong>: textContent와 이스케이프 처리로 XSS를 방어합니다.
    </div>

    <div class="defense-info">
        <strong>적용된 방어 방법:</strong><br>
        1. textContent 사용 (innerHTML 대신)<br>
        2. HTML 특수문자 이스케이프 처리<br>
        3. DOM API로 요소 생성 (template literal 미사용)
    </div>

    <h1>댓글 게시판 (안전한 버전)</h1>

    <form id="comment-form">
        <label for="comment-input">댓글</label>
        <textarea
            id="comment-input"
            placeholder="댓글을 입력하세요..."
            maxlength="500"
        ></textarea>
        <button type="submit">댓글 등록</button>
    </form>

    <h2>댓글 목록</h2>
    <div id="comments"></div>

    <!-- 테스트: 이 XSS 페이로드들이 실행되지 않아야 함 -->
    <!-- <img src=x onerror="alert('XSS')"> -->
    <!-- <script>alert('XSS')</script> -->
    <!-- 위 내용을 입력해도 텍스트로만 표시됨! -->

    <script>
        // ─────────────────────────────────────────
        // 방어법 1: HTML 이스케이프 함수
        // 특수문자를 HTML 엔티티로 변환하여 스크립트 실행 방지
        // ─────────────────────────────────────────
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g,  '&amp;')   // & → &amp;
                .replace(/</g,  '&lt;')    // < → &lt;  (스크립트 태그 차단 핵심)
                .replace(/>/g,  '&gt;')    // > → &gt;
                .replace(/"/g,  '&quot;')  // " → &quot;
                .replace(/'/g,  '&#x27;'); // ' → &#x27;
        }

        const comments = [];

        document.getElementById('comment-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const rawInput = document.getElementById('comment-input').value;
            const trimmed  = rawInput.trim();

            if (!trimmed) return;

            // 저장 전에도 길이 제한 (서버에서도 동일하게 해야 함)
            if (trimmed.length > 500) return;

            comments.push({
                text: trimmed,   // 원본 저장 (표시 시 이스케이프)
                time: new Date().toLocaleTimeString('ko-KR'),
                id:   comments.length + 1,
            });

            renderComments();
            this.reset();
        });

        function renderComments() {
            const container = document.getElementById('comments');
            container.innerHTML = ''; // 초기화

            if (comments.length === 0) {
                const p = document.createElement('p');
                p.textContent = '아직 댓글이 없습니다.';
                p.style.color = '#999';
                container.appendChild(p);
                return;
            }

            comments.forEach((comment) => {
                // ─────────────────────────────────────────
                // 방어법 2: DOM API로 요소 생성
                // innerHTML 대신 createElement + textContent 사용
                // textContent는 HTML을 파싱하지 않으므로 스크립트 실행 불가
                // ─────────────────────────────────────────
                const div = document.createElement('div');
                div.className = 'comment';

                const author = document.createElement('div');
                author.className = 'comment-author';
                // ✓ textContent: 어떤 입력이 와도 텍스트로만 처리
                author.textContent = `익명${comment.id}`;

                const text = document.createElement('div');
                text.className = 'comment-text';
                // ✓ 이스케이프 처리 후 innerHTML 사용 (또는 textContent 사용)
                // 여기서는 textContent가 더 안전
                text.textContent = comment.text;

                const time = document.createElement('div');
                time.className = 'comment-time';
                time.textContent = comment.time;

                div.appendChild(author);
                div.appendChild(text);
                div.appendChild(time);
                container.appendChild(div);
            });
        }

        // ─────────────────────────────────────────
        // 방어법 3: innerHTML을 꼭 써야 한다면 이스케이프 후 사용
        // ─────────────────────────────────────────
        function renderWithEscape(comment) {
            const div = document.createElement('div');
            div.className = 'comment';

            // 이스케이프 처리한 값만 innerHTML에 삽입
            div.innerHTML = `
                <div class="comment-author">${escapeHtml('익명' + comment.id)}</div>
                <div class="comment-text">${escapeHtml(comment.text)}</div>
                <div class="comment-time">${escapeHtml(comment.time)}</div>
            `;

            return div;
        }

        // 초기 렌더링
        renderComments();
    </script>
</body>
</html>
