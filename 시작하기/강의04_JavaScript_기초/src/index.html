<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>김지훈의 인터랙티브 홈페이지</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
            background: #ffffff;
            color: #111;
            transition: background 0.3s, color 0.3s;
        }
        h1 { color: #2563eb; }
        .card {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }

        /* 다크모드 */
        body.dark {
            background: #1a1a1a;
            color: #f3f4f6;
        }
        body.dark .card {
            background: #2a2a2a;
        }
        body.dark h1 {
            color: #93c5fd;
        }
    </style>
</head>
<body>
    <button id="darkBtn">🌙 다크모드</button>

    <h1>안녕하세요, 김지훈입니다 👋</h1>
    <p>JavaScript로 동작을 추가한 홈페이지입니다.</p>

    <div class="card">
        <h2>클릭 카운터</h2>
        <p>버튼을 누른 횟수: <span id="count">0</span></p>
        <button id="clickBtn">눌러보세요</button>
    </div>

    <div class="card">
        <h2>인사 만들기</h2>
        <input id="nameInput" type="text" placeholder="이름을 입력하세요">
        <p id="greeting"></p>
    </div>

    <script>
        // 1. 다크모드 토글
        const darkBtn = document.getElementById("darkBtn");
        darkBtn.addEventListener("click", function() {
            document.body.classList.toggle("dark");
            if (document.body.classList.contains("dark")) {
                darkBtn.textContent = "☀️ 라이트모드";
            } else {
                darkBtn.textContent = "🌙 다크모드";
            }
        });

        // 2. 클릭 카운터
        let count = 0;
        const clickBtn = document.getElementById("clickBtn");
        const display = document.getElementById("count");
        clickBtn.addEventListener("click", function() {
            count = count + 1;
            display.textContent = count;
        });

        // 3. 실시간 인사 만들기
        const nameInput = document.getElementById("nameInput");
        const greeting = document.getElementById("greeting");
        nameInput.addEventListener("input", function() {
            const name = nameInput.value;
            if (name.length > 0) {
                greeting.textContent = "안녕하세요, " + name + "님!";
            } else {
                greeting.textContent = "";
            }
        });
    </script>
</body>
</html>
