<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>XSS 취약한 댓글 페이지 (학습용)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .comment { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 6px; }
        textarea { width: 100%; height: 80px; padding: 8px; margin-bottom: 8px; }
        button { padding: 8px 16px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }

        /* 경고 배너 */
        .warning {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="warning">
        ⚠ <strong>학습용 취약 코드</strong>: 이 페이지는 XSS 취약점을 보여주기 위한 예제입니다.
        실제 서비스에서는 절대 이렇게 구현하면 안 됩니다.
    </div>

    <h1>댓글 게시판 (취약 버전)</h1>

    <form id="comment-form">
        <textarea
            id="comment-input"
            placeholder="댓글을 입력하세요..."
        ></textarea>
        <button type="submit">댓글 등록</button>
    </form>

    <h2>댓글 목록</h2>
    <div id="comments"></div>

    <!-- ⚠ 아래 테스트 페이로드를 입력창에 붙여넣으면 XSS 발생! -->
    <!-- 테스트용 페이로드:
         <img src=x onerror="alert('XSS 발생! 쿠키: ' + document.cookie)">
         <script>alert('Stored XSS')</script>
         <svg onload="alert('SVG XSS')">
    -->

    <script>
        const comments = [];

        document.getElementById('comment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('comment-input').value;

            if (!input.trim()) return;

            // ⚠ 취약점: 사용자 입력을 그대로 innerHTML에 삽입
            // innerHTML은 HTML을 파싱하므로 스크립트가 실행됨!
            comments.push(input);
            renderComments();
            this.reset();
        });

        function renderComments() {
            const container = document.getElementById('comments');
            container.innerHTML = ''; // 초기화

            comments.forEach((comment, i) => {
                const div = document.createElement('div');
                div.className = 'comment';

                // ⚠ 핵심 취약점: innerHTML에 사용자 입력 직접 삽입
                // 공격자가 <script>나 <img onerror>를 입력하면 실행됨
                div.innerHTML = `
                    <strong>익명${i + 1}</strong>
                    <p>${comment}</p>  <!-- ← 여기가 취약점! -->
                `;

                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
