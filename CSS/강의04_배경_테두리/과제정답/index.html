<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 카드 갤러리 — 과제 정답</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="page-header">
    <h1>이미지 카드 갤러리</h1>
    <p>배경, 그림자, hover 효과를 활용한 인터랙티브 갤러리</p>
  </header>

  <main class="container">

    <div class="gallery">

      <!-- 카드 1: 바다 / 파랑 그라데이션 -->
      <div class="gallery-card">
        <div class="card-image card-image-ocean">
          <div class="card-overlay">
            <span class="card-tag">자연</span>
          </div>
        </div>
        <div class="card-info">
          <h3>넓고 푸른 바다</h3>
          <p>파도 소리와 함께하는 여유로운 시간. 지평선 너머로 펼쳐지는 무한한 가능성.</p>
          <button class="card-btn">자세히 보기</button>
        </div>
      </div>

      <!-- 카드 2: 노을 / 주황 그라데이션 -->
      <div class="gallery-card">
        <div class="card-image card-image-sunset">
          <div class="card-overlay">
            <span class="card-tag">풍경</span>
          </div>
        </div>
        <div class="card-info">
          <h3>황금빛 노을</h3>
          <p>하루의 끝, 하늘을 물들이는 아름다운 노을. 잠시 멈추고 바라보고 싶은 순간.</p>
          <button class="card-btn">자세히 보기</button>
        </div>
      </div>

      <!-- 카드 3: 숲 / 초록 그라데이션 -->
      <div class="gallery-card">
        <div class="card-image card-image-forest">
          <div class="card-overlay">
            <span class="card-tag">자연</span>
          </div>
        </div>
        <div class="card-info">
          <h3>초록빛 숲</h3>
          <p>싱그러운 나뭇잎 사이로 스며드는 햇살. 자연의 품에서 느끼는 고요함과 평화.</p>
          <button class="card-btn">자세히 보기</button>
        </div>
      </div>

    </div>

  </main>

  <footer class="page-footer">
    <p>이미지 카드 갤러리 &copy; 2025</p>
  </footer>

</body>
</html>
