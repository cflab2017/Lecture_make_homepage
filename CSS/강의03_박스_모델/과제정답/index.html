<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 컴포넌트 — 과제 정답</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="page-title">프로필 카드 컴포넌트</h1>
  <p class="page-subtitle">박스 모델(padding / border / margin)로 완성한 카드</p>

  <!-- 카드 3개를 감싸는 래퍼 -->
  <div class="cards-wrapper">

    <!-- 카드 1 -->
    <div class="card">
      <!-- 이미지 영역: 배경색으로 대체 -->
      <div class="card-image card-image-blue"></div>
      <div class="card-body">
        <h2 class="card-name">홍길동</h2>
        <p class="card-role">프론트엔드 개발자</p>
        <p class="card-desc">안녕하세요! CSS를 공부하고 있는 웹 개발자입니다. 예쁜 UI를 만드는 것이 목표입니다.</p>
        <div class="card-tags">
          <span class="tag">HTML</span>
          <span class="tag">CSS</span>
          <span class="tag">JavaScript</span>
        </div>
      </div>
    </div>

    <!-- 카드 2 -->
    <div class="card">
      <div class="card-image card-image-green"></div>
      <div class="card-body">
        <h2 class="card-name">김미래</h2>
        <p class="card-role">UI/UX 디자이너</p>
        <p class="card-desc">사용자 경험을 중심으로 아름답고 직관적인 인터페이스를 디자인합니다.</p>
        <div class="card-tags">
          <span class="tag">Figma</span>
          <span class="tag">CSS</span>
          <span class="tag">Prototyping</span>
        </div>
      </div>
    </div>

    <!-- 카드 3 -->
    <div class="card">
      <div class="card-image card-image-purple"></div>
      <div class="card-body">
        <h2 class="card-name">이하늘</h2>
        <p class="card-role">풀스택 개발자</p>
        <p class="card-desc">프론트엔드부터 백엔드까지 폭넓은 기술 스택을 가진 개발자입니다.</p>
        <div class="card-tags">
          <span class="tag">React</span>
          <span class="tag">Node.js</span>
          <span class="tag">Python</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
